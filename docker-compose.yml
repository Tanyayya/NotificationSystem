services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "cub", "zk-ready", "localhost:2181", "5"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 20s

  # Removes stale /brokers/ids/1 in ZooKeeper when Kafka is recreated before the old
  # ZK session expires (otherwise Kafka fatals with NodeExists / owner session mismatch).
  kafka-zk-prune:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        cub zk-ready zookeeper:2181 60
        set +e
        zookeeper-shell zookeeper:2181 <<'ZK'
        deleteall /brokers/ids/1
        quit
        ZK
        exit 0

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      zookeeper:
        condition: service_healthy
      kafka-zk-prune:
        condition: service_completed_successfully
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 40s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: worker-events
      KAFKA_TOPIC_PARTITIONS: "3"
    entrypoint: ["/bin/bash", "-euc"]
    command:
      - |
        kafka-topics --bootstrap-server "$${KAFKA_BOOTSTRAP}" \
          --create --if-not-exists \
          --topic "$${KAFKA_TOPIC}" \
          --partitions "$${KAFKA_TOPIC_PARTITIONS}" \
          --replication-factor 1

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: notif
      POSTGRES_PASSWORD: notif
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notif -d notifications"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    ports:
      - "3000:3000"
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: worker-events
    depends_on:
      kafka:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: ./fanout/Dockerfile
      target: worker
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: worker-events
      KAFKA_GROUP_ID: worker-skeleton
      HTTP_ADDR: ":8080"
      GIN_MODE: release
      REDIS_ADDR: redis:6379
      DB_DSN: postgres://notif:notif@postgres:5432/notifications?sslmode=disable
      FANOUT_THRESHOLD: "1000"
      NOTIFY_DEFAULT_USER_ID: default
      NOTIFY_FROM_USER: alice
      NOTIFY_MESSAGE: Alice posted a photo
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      replicas: 3

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8085:8080"
    environment:
      REDIS_ADDR: redis:6379
      TASK_ID: local
      DB_DSN: postgres://notif:notif@postgres:5432/notifications?sslmode=disable
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  readapi:
    build:
      context: .
      dockerfile: readapi/Dockerfile
    ports:
      - "8086:8082"
    environment:
      REDIS_ADDR: redis:6379
      HTTP_ADDR: ":8082"
      GIN_MODE: release
      DATABASE_URL: postgres://notif:notif@postgres:5432/notifications
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis-subscriber:
    profiles:
      - test-fanout
    build:
      context: .
      dockerfile: ./fanout/Dockerfile
      target: redis-subscriber
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy

  kafka-producer:
    profiles:
      - test-fanout
    build:
      context: .
      dockerfile: ./fanout/Dockerfile
      target: kafka-producer
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: worker-events
      HTTP_ADDR: ":8081"
      GIN_MODE: release
      LOAD_PEAK_MSG_PER_SEC: "20"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
