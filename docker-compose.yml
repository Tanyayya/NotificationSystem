services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  ingestion:
    build:
      context: .
      dockerfile: ingestion/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - KAFKA_BROKER=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  gateway:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:29092",
        ]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 40s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      KAFKA_TOPIC: worker-events
      KAFKA_TOPIC_PARTITIONS: "3"
    entrypoint: ["/bin/bash", "-euc"]
    command:
      - |
        kafka-topics --bootstrap-server "$${KAFKA_BOOTSTRAP}" \
          --create --if-not-exists \
          --topic "$${KAFKA_TOPIC}" \
          --partitions "$${KAFKA_TOPIC_PARTITIONS}" \
          --replication-factor 1

  worker:
    build:
      context: .
      dockerfile: ./fanout/Dockerfile
      target: worker
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC: worker-events
      KAFKA_GROUP_ID: worker-skeleton
      HTTP_ADDR: ":8080"
      GIN_MODE: release
      REDIS_ADDR: redis:6379
      NOTIFY_DEFAULT_USER_ID: default
      NOTIFY_FROM_USER: alice
      NOTIFY_MESSAGE: Alice posted a photo
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    deploy:
      replicas: 3

  redis-subscriber:
    profiles:
      - test-fanout
    build:
      context: .
      dockerfile: ./fanout/Dockerfile
      target: redis-subscriber
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # Person B adds their fanout worker here
  # fanout:
  #   build:
  #     context: .
  #     dockerfile: fanout/Dockerfile
  #   environment:
  #     - REDIS_ADDR=redis:6379
  #     - KAFKA_ADDR=kafka:9092